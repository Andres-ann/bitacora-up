<!DOCTYPE html>
<html lang="en">

<head>
  <!-- Required meta tags -->
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- Favicon -->
  <link rel="icon" href="./img/favicon.jpg">

  <!-- Bootstrap & CSS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.7.2/font/bootstrap-icons.css">
  <link rel="stylesheet" href="./css/bootstrap.min.css" />
  <link rel="stylesheet" href="./css/bootstrap.min.css">
  <link rel="stylesheet" href="./css/style.css">
</head>

<body>
  <!-- ADD TASK -->
  <div class="container p-4">
    <div class="card rounded shadow">
      <div class="card">
        <div class="card-body">
          <div class="col text-center p-4">
            <h1 class="display-3"><a href="../index.html" class="text-dark text-decoration-none">Vitacora UP
            </a></h1>
          </div>

          <!-- Button trigger modal -->
          <div class="d-flex">
            <button type="button" class="btn btn-success ms-auto p-2 me-lg-5 bd-highligh" data-bs-toggle="modal" data-bs-target="#exampleModal">
              <i class="bi bi-plus-circle"></i>
              Agregar
            </button>
          </div>
          

          <!-- Modal -->
          <div class="modal fade" id="exampleModal" tabindex="-1" aria-labelledby="exampleModalLabel"
            aria-hidden="true">
            <div class="modal-dialog modal-lg">
              <div class="modal-content">
                <div class="modal-header">
                  <h5 class="modal-title" id="exampleModalLabel">Crear / Modificar</h5>
                  <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                  <form id="task-form">
                    <label for="description">Frase:</label>
                    <textarea id="task-description" rows="3" class="form-control mb-3" autofocus ></textarea>
                    <label for="title">Autor:</label>
                    <input type="text" id="task-title" class="form-control mb-3" class="My First Title" />                    
        
                  </div>
                  <div class="modal-footer">
                    <button class="btn btn-success" id="btn-task-form">Guardar</button>
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cerrar</button>                    
                  </div>                    
                  </form>                
              </div>
            </div>
          </div>

          
        </div>

        <!-- Tasks List -->
        <div id="tasks-container"></div>
      </div>
    </div>
  </div>

  </div>

  <!-- CUSTOM CODE -->
  <script src="../assets/js/index.js" type="module"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-ka7Sk0Gln4gmtz2MlQnikT1wXgYsOg+OMhuP+IlRH9sENBO0LRn5q+8nbTov4+1p" crossorigin="anonymous">
  </script>
</body>

</html>
