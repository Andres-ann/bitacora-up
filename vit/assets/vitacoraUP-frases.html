<!DOCTYPE html>
<html lang="es">

<head>
  <!-- Required meta tags -->
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- Favicon -->
  <link rel="icon" href="./img/favicon.jpg">

  <!-- Bootstrap & CSS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.7.2/font/bootstrap-icons.css">
  <link rel="stylesheet" href="./css/bootstrap.min.css" />
  <link rel="stylesheet" href="./css/bootstrap.min.css">
  <link rel="stylesheet" href="./css/style.css">

  <title>Vitacora UP</title>
</head>

<body>
  <div class="container mt-5 pt-5">
    <div class="card p-4 shadow">
      <!-- Header -->
      <div class="row align-items-center">
        <div class="col-lg-10 mb-4">
          <h1 class="display-1 text-center">            
            <a href="../index.html" class="text-dark text-decoration-none">Vitacora UP
            </a>
          </h1>
        </div>
        <!-- Button trigger modal -->
        <div class="col-lg-2">
          <button type="button" class="btn btn-success" data-bs-toggle="modal" data-bs-target="#exampleModal">
            <i class="bi bi-plus-circle"></i>
            Agregar
          </button>
        </div>
      </div>

      <!-- Header Table -->
      <table class="table align-middle">
        <thead>
          <tr class="text-center">
            <th class="col-9" scope="col">Frases</th>
            <th class="col" scope="col">Acciones</th>
          </tr>
        </thead>

        <tbody id="task-container">
          <!-- data BD -->
        </tbody>
      </table>
    </div>
  </div>

  <!-- Modal Create New Frase-->
  <div id="modal-add">
    <div class="modal fade" id="exampleModal" tabindex="-1" aria-labelledby="exampleModalLabel" aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title" id="staticBackdropLabel">Agregar Nuevo</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body">
            <form id="task-form">
              <div class="mb-3">                
                <textarea type="textarea" rows="4" cols="50" class="form-control" id="frase"></textarea>
              </div>
              <div class="modal-footer">
                <button class="btn btn-success">
                  <i class="bi bi-check-circle"></i>
                  Guardar
                </button>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Modal Modify Frase-->
  <div id="modal-add">
    <div class="modal fade" id="exampleModal-1" tabindex="-1" aria-labelledby="exampleModalLabel" aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title" id="staticBackdropLabel">Modificar Frase</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body">
            <form id="edit-form">
              <div class="mb-3">
                <textarea type="textarea" rows="4" cols="50" class="form-control" id="edit-frase"></textarea>
              </div>
              <div class="modal-footer">
                <button type="submit" class="btn btn-success">
                  <i class="bi bi-check-circle"></i>
                  Guardar
                </button>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Bootstrap Bundle with Popper & JS-->
  <script src="./js/bootstrap.min.js"></script>
  <script src="./js/bootstrap.bundle.min.js"></script>
  <script type="module" src="./js/index.js"></script>

</body>


</html>
